        0 0 0 3px #FFD700,
        0 0 40px rgba(255,215,0,0.5),
        0 10px 40px rgba(0,0,0,0.8);
      animation: pulse 2s ease-in-out infinite;
    }

    #splash .app-name {
      color: #FFD700;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 32px; font-weight: 900;
      margin-top: 28px; letter-spacing: 2px;
      text-shadow: 0 0 20px rgba(255,215,0,0.6), 0 2px 8px rgba(0,0,0,0.8);
    }

    #splash .app-sub {
      color: rgba(255,215,0,0.7);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px; font-weight: 500;
      margin-top: 6px; letter-spacing: 3px; text-transform: uppercase;
    }

    #splash .loading-bar-wrap {
      margin-top: 36px; width: 180px; height: 3px;
      background: rgba(255,215,0,0.15);
      border-radius: 4px; overflow: hidden;
    }

    #splash .loading-bar {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, #FFD700, #FFC107);
      border-radius: 4px;
      animation: loadbar 4s ease-in-out forwards;
      box-shadow: 0 0 10px rgba(255,215,0,0.8);
    }

    @keyframes pulse {
      0%,100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes loadbar { 0%{width:0%} 40%{width:60%} 80%{width:85%} 100%{width:100%} }

    #app-frame {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      border: none; z-index: 1;
    }
  </style>
</head>
